name: PR Quality Gates

on:
  pull_request:
    branches: [main]

jobs:
  backend-tests-coverage:
    name: Backend -- Unit Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests with 95% coverage gate
        run: npm run test:coverage

  frontend-tests-coverage:
    name: Frontend -- Unit Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests with 95% coverage gate
        run: npm run test:coverage

  docs-guard:
    name: Docs -- Required Updates Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify docs were updated when source changed
        env:
          DOCS_CHECK_BASE_REF: ${{ github.base_ref }}
        run: node ./scripts/docs-check.mjs
