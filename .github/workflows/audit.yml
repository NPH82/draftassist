name: Security Audit & Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit-backend:
    name: Backend -- Audit & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies (strict lockfile)
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high

  audit-frontend:
    name: Frontend -- Audit, Build & PWA check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (strict lockfile)
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Build (catches peer dep & compile errors pre-deploy)
        run: npm run build
